<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>精选服务者｜地陪客户</title>
    <meta name="description" content="查看地陪客户首批服务者展示样例，可按城市、服务类型、价格、性别筛选，并提交正规陪同服务预约需求。" />
    <link rel="canonical" href="https://www.dipeikehu.com/providers.html" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="地陪客户首页">
          <img class="brand-mark" src="./favicon.svg" alt="" />
          <span><strong>地陪客户</strong><small>专业陪同服务平台</small></span>
        </a>
        <nav class="main-nav" id="mainNav" aria-label="主导航">
          <a href="./index.html">首页</a>
          <a class="active" href="./providers.html">精选服务者</a>
          <a href="./services.html">服务分类</a>
          <a href="./cities.html">开放城市</a>
          <a href="./booking-rule.html">预约规则</a>
          <a href="./index.html#booking">预约需求</a>
          <a href="./index.html#join">入驻合作</a>
        </nav>
        <div class="header-actions">
          <a class="btn ghost small" href="./contact.html">联系客服</a>
          <a class="btn gold small" href="./index.html#booking">提交预约</a>
        </div>
        <button class="menu-toggle" id="menuToggle" aria-label="展开导航" aria-expanded="false">菜单</button>
      </div>
    </header>

    <main>
      <section class="page-hero provider-page-hero">
        <div class="container">
          <p class="eyebrow">服务者列表</p>
          <h1>按城市和服务类型筛选合适的本地服务者</h1>
          <p>当前页面为首批审核展示样例，实际可预约时间、服务者和价格由平台客服根据需求确认。</p>
        </div>
      </section>

      <section class="section">
        <div class="container two-column">
          <aside class="filter-panel" aria-label="服务者筛选">
            <p class="eyebrow">筛选条件</p>
            <h2>快速查找</h2>
            <label>
              城市
              <select id="providerCity">
                <option value="">全部城市</option>
                <option>北京</option>
                <option>上海</option>
                <option>广州</option>
                <option>深圳</option>
                <option>成都</option>
                <option>杭州</option>
                <option>西安</option>
                <option>重庆</option>
              </select>
            </label>
            <label>
              服务类型
              <select id="providerService">
                <option value="">全部类型</option>
                <option>商务接待</option>
                <option>城市陪同</option>
                <option>旅游向导</option>
                <option>办事协助</option>
                <option>展会陪同</option>
                <option>机场接送</option>
              </select>
            </label>
            <label>
              价格上限
              <select id="providerPrice">
                <option value="">不限价格</option>
                <option value="350">350 元以内</option>
                <option value="450">450 元以内</option>
                <option value="600">600 元以内</option>
              </select>
            </label>
            <label>
              性别
              <select id="providerGender">
                <option value="">不限</option>
                <option>男</option>
                <option>女</option>
              </select>
            </label>
            <button class="btn gold wide" id="resetProviderFilters" type="button">重置筛选</button>
          </aside>
          <div class="list-content">
            <div class="section-heading compact">
              <p class="eyebrow">精选服务者</p>
              <h2>展示关键信息，不堆砌无关标签</h2>
              <p id="providerSummary">可按城市、服务类型、价格和性别筛选展示样例。</p>
            </div>
            <div class="provider-grid" id="providerGrid"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <a class="brand footer-brand" href="./index.html"><span><strong>地陪客户</strong><small>专业陪同服务平台</small></span></a>
          <p>面向城市陪同、商务接待、旅游向导、办事协助和机场接送的正规服务预约平台。</p>
        </div>
        <div class="footer-links">
          <a href="./providers.html">精选服务者</a>
          <a href="./services.html">服务分类</a>
          <a href="./cities.html">开放城市</a>
          <a href="./booking-rule.html">预约规则</a>
          <a href="./about.html">关于我们</a>
          <a href="./terms.html">服务协议</a>
          <a href="./privacy.html">隐私政策</a>
          <a href="./contact.html">联系客服</a>
          <a href="./report.html">投诉举报</a>
        </div>
      </div>
    </footer>
    <script src="./app.js"></script>
    <script src="./providers.js"></script>
  </body>
</html>
